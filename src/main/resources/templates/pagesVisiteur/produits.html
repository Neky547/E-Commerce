<!DOCTYPE html>
<html th:replace="base :: html" lang="fr" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <main>
        <h1>Produits</h1>
        <p>Liste des produits</p>
        <ul>
            <li th:each="produit : ${produits}">
                <a th:href="@{'/Groovium/Produits' + ${produit.id}}" th:text="${produit.nom}"></a>
            </li>
        </ul>
    </main>
</div>
</html>
