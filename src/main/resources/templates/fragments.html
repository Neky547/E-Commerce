<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Groovium</title>
</head>
<body>

<!-- HEADER -->
<div th:fragment="header" class="container-fluid">
    <header class="row">
        <nav class="navbar navbar-expand-lg navbar-dark bg-light">

            <!-- Logo -->
            <a class="navbar-brand" th:href="@{/groovium}">
                <img th:src="@{/img/logo.png}" alt="Logo Groovium" width="150" height="50" class="d-inline-block align-text-top">
            </a>

            <div class="collapse navbar-collapse">
                <div class="d-flex ms-auto align-items-center">

                    <!-- Retour à la page d'accueil -->
                    <li class="nav-item">
                        <a class="nav-link text-dark" th:href="@{/Groovium}">
                            <i class="bi bi-house-fill"></i>
                        </a>
                    </li>

                    <!-- Barre de recherche -->
                    <form class="d-flex me-3" action="/produits" method="GET">
                        <input class="form-control me-2" type="search" name="recherche" placeholder="Rechercher...">
                        <button class="btn btn-outline-dark" type="submit">Chercher</button>
                    </form>

                    <ul class="navbar-nav align-items-center gap-2">

                        <!-- Panier (toujours visible) -->
                        <li class="nav-item">
                            <a class="nav-link text-dark" th:href="@{/Panier}">
                                <i class="bi bi-cart2"></i>
                            </a>
                        </li>

                        <!-- Dropdown profil -->
                        <li class="nav-item dropdown">
                            <a class="nav-link text-dark dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-person-fill"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">

                                <!-- Si NON connecté -->
                                <div sec:authorize="!isAuthenticated()">
                                    <li>
                                        <a class="dropdown-item" th:href="@{/Groovium/Login}">Connexion</a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item" th:href="@{/Groovium/Inscription}">Inscription</a>
                                    </li>
                                </div>

                                <!-- Si connecté -->
                                <div sec:authorize="isAuthenticated()">
                                    <li sec:authorize="hasRole('ADMIN')">
                                        <a class="dropdown-item" th:href="@{/groovium/admin/dashboard}">Administration</a>
                                    </li>
                                    <li sec:authorize="hasRole('ADMIN')">
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li>
                                        <form th:action="@{/Groovium}" method="post">
                                            <button type="submit" class="dropdown-item text-danger">Déconnexion</button>
                                        </form>
                                    </li>
                                </div>

                            </ul>
                        </li>

                    </ul>
                </div>
            </div>

        </nav>
    </header>
</div>

<!-- FOOTER -->
<div th:fragment="footer" class="container-fluid">
    <footer>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-bottom">
            <div class="container">
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/Conditions}">Conditions générales et confidentialité</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/Avis}">Donnez-nous votre avis</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/Contact}">Contact</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/Aide}">Aide</a>
                        </li>
                    </ul>
                    <span class="navbar-text text-secondary ms-auto">© Groovium 2025</span>
                </div>
            </div>
        </nav>
    </footer>
</div>

</body>
</html>
